<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <div class="header">
      <h1>Task Manager</h1>
      <p>Stay on top of your day</p>
      <div class="stats">
        <div class="stat">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-number done" id="doneCount">0</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="pendingCount">0</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-row">
        <input
          type="text"
          id="taskInput"
          placeholder="Add a new task..."
          aria-label="New task name"
          maxlength="200"
        />
        <button id="addBtn" aria-label="Add task">+ Add</button>
      </div>
    </div>

    <!-- Task List Section -->
    <div class="task-section">
      <div class="section-label">Tasks</div>
      <ul id="taskList" aria-label="Task list"></ul>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text" id="footerText">No tasks yet</span>
      <button id="clearBtn" aria-label="Clear completed tasks">Clear completed</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
